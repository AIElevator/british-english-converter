<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>British English Converter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>British English Converter</h1>
            <p>Transform your English text to authentic British English</p>
        </header>

        <main>
            <div class="converter-section">
                <div class="input-group">
                    <label for="inputText">Paste your text here:</label>
                    <textarea id="inputText" placeholder="Enter text to convert..." rows="10"></textarea>
                    <div class="button-group">
                        <button id="convertBtn" class="btn btn-primary">Convert to British English</button>
                        <button id="clearBtn" class="btn btn-secondary">Clear</button>
                    </div>
                </div>

                <div class="output-group">
                    <label for="outputText">Converted text:</label>
                    <textarea id="outputText" placeholder="Your converted text will appear here..." rows="10" readonly></textarea>
                    <div class="button-group">
                        <button id="copyBtn" class="btn btn-secondary">Copy to clipboard</button>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>British English Converter © 2025. Crafted with attention to authentic British writing standards.</p>
        </footer>
    </div>

    <script src="converter.js"></script>
</body>
</html>
